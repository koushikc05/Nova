<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova | AI Tutor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Topbar -->
        <header class="topbar">
            <div class="logo">
                <span class="status-dot"></span>
                <h1 class="nova-name">Nova</h1>
            </div>
            <div class="subtitle">AI Tutor</div>
        </header>

        <!-- Topic Pills -->
        <nav class="topics-container">
            <button class="topic-pill active" data-topic="General">General</button>
            <button class="topic-pill" data-topic="Python">Python</button>
            <button class="topic-pill" data-topic="SQL">SQL</button>
            <button class="topic-pill" data-topic="ML Concepts">ML Concepts</button>
            <button class="topic-pill" data-topic="DSA">DSA</button>
            <button class="topic-pill" data-topic="Maths for CS">Maths for CS</button>
        </nav>

        <!-- Chat Container -->
        <main class="chat-container" id="chat-container">
            <!-- Bubbles will be injected here -->
        </main>

        <!-- Quick Starters -->
        <div class="quick-starters-container" id="quick-starters">
            <button class="starter-btn">Explain like I'm 12</button>
            <button class="starter-btn">Give me an analogy</button>
            <button class="starter-btn">Quiz me on this</button>
            <button class="starter-btn">What should I learn next?</button>
            <button class="starter-btn">I'm confused, help!</button>
        </div>

        <!-- Input Area -->
        <footer class="input-container">
            <div class="input-wrapper">
                <textarea id="chat-input" placeholder="Ask Nova a question..." rows="1"></textarea>
                <button id="send-btn" class="send-btn" aria-label="Send message">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="send-icon"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
            <div class="input-hint">Press Enter to send, Shift + Enter for new line</div>
        </footer>
    </div>
    
    <script src="script.js" type="module"></script>
</body>
</html>
